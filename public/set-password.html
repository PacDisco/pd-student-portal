<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pacific Discovery Student Portal — Set Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <meta name="theme-color" content="#55BBD2">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8f8f8;
      color: #212121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      text-align: center;
      padding: 30px 20px 24px;
      background: #55BBD2;
      color: white;
    }
    header img {
      height: 70px;
      display: block;
      margin: 0 auto 16px;
    }
    header p {
      font-size: 13px;
      opacity: 0.7;
      margin: 0;
      letter-spacing: 2px;
    }
    .wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .box {
      background: white;
      border: 1px solid #e5e7eb;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    .box h2 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .box p {
      font-size: 13px;
      color: #666;
      margin: 0 0 24px;
    }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 1.5px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #666;
    }
    input {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 20px;
      border: 1px solid #e5e7eb;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      background: #f8f8f8;
      color: #212121;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #59a1aa;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #55BBD2;
      color: white;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    button:hover { opacity: 0.85; }
    .message {
      font-size: 13px;
      margin-top: 16px;
      display: none;
      padding: 12px;
      text-align: center;
    }
    .message.error { background: #fdf0ef; color: #c0392b; }
    .message.success { background: #f0f7f4; color: #55BBD2; }
  </style>
</head>
<body>
<header>
  <img src="/pacific-discovery-logo.png" alt="Pacific Discovery">
  <p>STUDENT PORTAL</p>
</header>

<div class="wrap">
  <div class="box" id="formBox">
    <h2>SET YOUR PASSWORD</h2>
    <p>Choose a password for your Pacific Discovery portal.</p>
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="••••••••" />
    <label>CONFIRM PASSWORD</label>
    <input type="password" id="confirm" placeholder="••••••••" />
    <button onclick="setPassword()">SET PASSWORD</button>
    <div class="message" id="message"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const email = params.get("email");

  // Verify token on load
  async function verifyToken() {
    if (!token || !email) {
      showError("Invalid link. Please request a new one.");
      return;
    }

    const res = await fetch(`/.netlify/functions/verify-token?token=${token}&email=${encodeURIComponent(email)}`);
    const data = await res.json();

    if (!data.valid) {
      showError(data.error === "Link has expired"
        ? "This link has expired. Please request a new one."
        : "Invalid link. Please request a new one."
      );
    }
  }

  function showError(msg) {
    document.getElementById("formBox").innerHTML = `
      <h2>LINK INVALID</h2>
      <p>${msg}</p>
      <a href="/login.html" style="color:#55BBD2; font-size:13px;">Back to login</a>
    `;
  }

  async function setPassword() {
    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirm").value.trim();
    const msg = document.getElementById("message");

    if (!password || !confirm) {
      msg.className = "message error";
      msg.style.display = "block";
      msg.textContent = "Please fill in both fields.";
      return;
    }

    if (password !== confirm) {
      msg.className = "message error";
      msg.style.display = "block";
      msg.textContent = "Passwords don't match.";
      return;
    }

    if (password.length < 8) {
      msg.className = "message error";
      msg.style.display = "block";
      msg.textContent = "Password must be at least 8 characters.";
      return;
    }

    const res = await fetch("/.netlify/functions/set-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, email, password })
    });

    const data = await res.json();

    if (data.success) {
      if (data.token) sessionStorage.setItem("portalToken", data.token);
      sessionStorage.setItem("portalEmail", data.email || email);
      if (data.adminRole) sessionStorage.setItem("adminRole", data.adminRole);
      if (data.firstName) sessionStorage.setItem("firstName", data.firstName);
      msg.className = "message success";
      msg.style.display = "block";
      msg.textContent = "Password set! Redirecting...";
      setTimeout(() => {
        window.location.href = data.adminRole ? "/admin.html" : "/index.html";
      }, 1500);
    } else {
      msg.className = "message error";
      msg.style.display = "block";
      msg.textContent = data.error || "Something went wrong.";
    }
  }

  verifyToken();
</script>
</body>
</html>
